html, body {

       body {

        .page-hero::before {
    content: "";

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.5;
    background: #2d1a32;  
    z-index: 1;
}

.back-btn {
    position: absolute;
    top: 4.5%;
    left: 1.5%;
    width: 45px;
    z-index: 50;
    cursor: pointer;
    transition: all 0.4s ease;
}

.back-btn img {
    width: 100%;
    display: block;
}

.back-btn:hover {
    transform: scale(1.15) rotate(2deg);
    opacity: 0.9;
}

.card-carousel {
    position: relative;
    width: 100%;
    min-height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;
    padding: 60px 0;   /* 🔥 THIS prevents top/bottom cut */
    z-index: 2;
}

.carousel-track {
    display: flex;
    gap: 40px;
    transition: transform 0.6s ease;
}

/* CARD BASE */
/* CARD BASE */
.card {
    width: 280px;       /* slightly smaller overall */
    height: 420px;
    perspective: 1200px;
    transition: 0.4s ease;
    transform: scale(0.8);   /* side cards smaller */
    filter: brightness(50%);
    flex-shrink: 0;
}

/* CENTER CARD */
.card.active {
    transform: scale(1.01);     /* only card scales */
    filter: brightness(100%);
}

/* INNER FLIP */
.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.7s ease;
    transform-style: preserve-3d;
}

/* FLIP ON HOVER */
.card:hover .card-inner {
    transform: rotateY(180deg);
}

/* FRONT & BACK */
.card-front,
.card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;

}

.card-front img,
.card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BACK ROTATION */
.card-back {
    transform: rotateY(180deg);
}

.carousel-viewport {
    width: 950px;        /* 3 cards visible */
    overflow: hidden;
}


/* ARROWS */
.arrow {
    position: absolute;
    background: none;
    border: none;
    font-size: 60px;
    color: white;
    cursor: pointer;
    z-index: 20;
    transition: 0.3s ease;
}

.arrow:hover {
    transform: scale(1.2);
    color: #ffd173;
}

.arrow.left {
    left: 5%;
}

.arrow.right {
    right: 5%;
}

    </style>

function playTransition(targetPage) {

    const overlay = document.getElementById("transitionOverlay");

    video.play();

    video.onended = function () {
        window.location.href = targetPage;
    };
}
</script>

<script>
const track = document.querySelector('.carousel-track');
const cards = document.querySelectorAll('.card');
const viewport = document.querySelector('.carousel-viewport');

let currentIndex = 1;

function updateActive() {

    cards.forEach(card => card.classList.remove('active'));
    cards[currentIndex].classList.add('active');

    const cardWidth = cards[0].offsetWidth + 50; // 50 = gap
    const center = viewport.offsetWidth / 2 - cards[0].offsetWidth / 2;

    track.style.transform =
        `translateX(${center - currentIndex * cardWidth}px)`;
}

cards[0].offsetWidth

function moveSlide(direction) {
    currentIndex += direction;

    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex > cards.length - 1)
        currentIndex = cards.length - 1;

    updateActive();
}

updateActive();

</script>
