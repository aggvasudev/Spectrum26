<!DOCTYPE html>
<html>
<head>
    <title>SPECTRUM 2026 | Nift Delhi</title>
    <meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" sizes="42x42" href="Backgrounds/favicon.png">

    <style>
        
        body {
            margin: 0;
            overflow: hidden;
        }
        
        .hero {
            height: 100vh;
            width: 100%;
            background-image: url('Backgrounds/openingpage.png');
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgb(255, 255, 255);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

</head>
<body>

   <div class="hero" onclick="playVideo()"></div>

    <div class="video-container" id="videoContainer">
        <video id="myVideo" src="Backgrounds/transition.MP4" muted></video>
    </div>

    <div class="main-home" id="mainHome">
        <h1>Welcome to My Website</h1>
        <p>This is the real homepage content.</p>
    </div>

     <script>
        function playVideo() {
            const videoContainer = document.getElementById("videoContainer");
            const video = document.getElementById("myVideo");

            videoContainer.style.display = "flex";
            video.play();

          video.onended = function() {
    window.location.href = "index.html";
};

        }
    </script>

</body>
</html>
