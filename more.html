<!DOCTYPE html>
<html>
<head>
    <title>More | SPECTRUM 2026 | Nift Delhi</title>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
        }

        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Image */
        .bg-image {
            width: 100%;
            height: 100%;
        }

        /* ========================= */
        /* BUTTONS 1–4 (Grouped) */
        /* ========================= */

        .btn-group img {
            position: absolute;
            width: 200px;              /* shared size */
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn-group img:hover {
            transform: scale(1.08);
        }

        .custom-btn1 {
            top: 75%;
            left: 18%;
        }

        .custom-btn2 {
            top: 40%;
            left: 35%;
        }

        .custom-btn3 {
            top: 70%;
            left: 55%;
        }

        .custom-btn4 {
            top: 20%;
            left: 65%;
        }

        /* ========================= */
        /* BUTTON 5 (FULLY SEPARATE) */
        /* ========================= */

        .custom-btn5 {
            position: absolute;

            width: 45px;      /* CHANGE FREELY */
            top: 4.5%;           /* CHANGE FREELY */
            left: 1.5%;

            cursor: pointer;
            transition: all 0.4s ease;
        }

        .custom-btn5:hover {
            transform: scale(1.15) rotate(2deg);
            opacity: 0.9;
        }

        .bottom-image {
    position: fixed;
    bottom: 10px;       /* distance from bottom */
    left: 50%;
    transform: translateX(-50%);

    width: 150px;       /* adjust size */
    max-width: 80%;

    z-index: 50;
}

/* ===== Base Navbar Styling ===== */
.navbar {
    width: 90%;
    /* background: #ffffff; */
    padding: 12px 10px;
    box-sizing: border-box;
}

.nav-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ===== Nav Links ===== */
.nav-links {
    display: flex;
    gap: 35px;
}

.nav-links a {
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    /* color: #222; */
    transition: 0.3s ease;
}

/* .nav-links a:hover {
    color: #007bff;
} */

/* ===== Logo ===== */
.logo img {
    width: 140px;     /* Proper fixed width */
    height: auto;
    display: block;
}

@media (max-width: 1024px) and (min-width: 768px) {

    .navbar {
        padding: 12px 25px;   /* Reduce side padding */
    }

    .nav-links {
        gap: 20px;           /* Reduce link spacing */
    }

    .nav-links a {
        font-size: 15px;     /* Slightly smaller text */
    }

    .logo img {
        width: 110px;        /* Adjust logo size for tablets */
    }
}

    </style>
</head>

<body>

<section class="hero">

    <!-- Buttons 1–4 inside group -->
    <div class="btn-group">

        <a href="More pages/Brochure.html">
            <img src="Button Images/brochure.png" class="custom-btn1">
        </a>

        <a href="More pages/Merch.html">
            <img src="Button Images/merch.png" class="custom-btn2">
        </a>

        <a href="More pages/Gallery.html">
            <img src="Button Images/gallery.png" class="custom-btn3">
        </a>

        <a href="More pages/Schedule.html">
            <img src="Button Images/schedule.png" class="custom-btn4">
        </a>

    </div>

    <!-- Button 5 completely separate -->
    <a href="index.html">
        <img src="Button Images/backicon.png" class="custom-btn5">
    </a>

    <!-- Background -->
    <img src="Backgrounds/more.png" class="bg-image" alt="More Page">

</section>

<img src="Button Images/madeby.png" class="bottom-image">

</body>
</html>
